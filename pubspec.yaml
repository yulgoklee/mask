name: mask_alert
description: 개인 건강 프로필 기반 맞춤형 미세먼지 마스크 착용 알림 앱
publish_to: 'none'
version: 1.0.5+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 로컬 저장
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # 알림
  flutter_local_notifications: ^17.2.2

  # 백그라운드 작업
  workmanager: ^0.9.0

  # HTTP 통신
  dio: ^5.4.3+1

  # 위치
  geolocator: ^13.0.1

  # 광고 — P4: AdMob 비활성화 (나중에 살리기 쉽게 주석으로 보존)
  # google_mobile_ads: ^5.1.0

  # 권한
  permission_handler: ^11.3.1

  # 아이콘
  cupertino_icons: ^1.0.6

  # 로딩 애니메이션 (분석 화면)
  flutter_spinkit: ^5.2.1
  firebase_core: ^4.6.0
  firebase_analytics: ^12.2.0
  firebase_crashlytics: ^5.1.0
  firebase_remote_config: ^6.3.0
  url_launcher: ^6.3.0
  uuid: ^4.5.3
  fl_chart: ^0.69.0

  # 라우팅
  go_router: ^14.0.0

  # UI 애니메이션
  flutter_animate: ^4.5.0
  flutter_staggered_animations: ^1.1.1

  # 스켈레톤 로딩
  skeletonizer: ^1.4.2

  # 글래스모피즘
  glassmorphism: ^3.0.0

  # 숫자 롤링 애니메이션
  animated_digit: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
